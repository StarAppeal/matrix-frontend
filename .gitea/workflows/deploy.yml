name: Build and Deploy Frontend

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: starappeal/matrix-frontend

jobs:
  build:
    runs-on: heavy
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest
          build-args: |
            EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}

  deploy:
    runs-on: light
    needs: build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_PAT
          script: |
            cd /home/matrix/ledmatrix-deployment
            
            echo "$GHCR_PAT" | docker login ghcr.io -u starappeal --password-stdin  

            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull frontend
            
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d frontend
            
            docker image prune -f
            
            docker logout ghcr.io
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}